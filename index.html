<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ball Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0a0a12;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #game {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    #hud {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      padding-top: max(10px, env(safe-area-inset-top));
      color: #e8e8f0;
      font-size: 15px;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, rgba(15,15,28,0.95), rgba(10,10,18,0.6));
      z-index: 1;
    }
    #hud span { opacity: 0.85; }
    #score { font-variant-numeric: tabular-nums; font-weight: 600; color: #7dff9a; text-shadow: 0 0 12px rgba(125,255,154,0.45); }
    #wrap {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #hint {
      position: absolute;
      bottom: max(14px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(200,200,230,0.55);
      pointer-events: none;
      text-align: center;
      max-width: 90%;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="hud">
      <span>Next</span>
      <span id="nextLabel">●</span>
      <span>Score <span id="score">0</span></span>
    </div>
    <div id="wrap">
      <canvas id="canvas" aria-label="Game"></canvas>
      <p id="hint">Tap to drop · same sizes merge</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
(function () {
  const Matter = window.Matter;
  const { Engine, Runner, World, Bodies, Body, Events, Composite } = Matter;

  const NEON = [
    '#ff2efd', '#00f7ff', '#faff00', '#ff6b00', '#39ff14',
    '#ff0d8f', '#00ffcc', '#fffc40', '#ff3366', '#b026ff', '#00ff66'
  ];

  const REST = 0.72;
  const FRICTION = 0.02;
  const WALL_THICK = 100;
  const MAX_LEVEL = NEON.length - 1;

  const canvas = document.getElementById('canvas');
  const scoreEl = document.getElementById('score');
  const nextLabel = document.getElementById('nextLabel');

  let width = 0;
  let height = 0;
  let engine;
  let runner;
  let world;
  let wallBodies = [];
  let score = 0;
  let nextDropLevel = 0;
  let dropCooldown = false;

  function ballRadius(level) {
    return 18 + level * 7;
  }

  function createBall(x, y, level) {
    level = Math.min(Math.max(0, level | 0), MAX_LEVEL);
    const r = ballRadius(level);
    const body = Bodies.circle(x, y, r, {
      restitution: REST,
      friction: FRICTION,
      frictionStatic: FRICTION,
      frictionAir: 0.012,
      density: 0.0018,
      label: 'ball',
      render: { fillStyle: NEON[level] }
    });
    body.isBall = true;
    body.ballLevel = level;
    body.mergeScheduled = false;
    World.add(world, body);
    return body;
  }

  function updateScore(points) {
    score += points;
    scoreEl.textContent = String(score);
  }

  function mergePair(a, b) {
    if (!a.isBall || !b.isBall) return;
    if (!Composite.contains(world, a) || !Composite.contains(world, b)) return;
    if (a.ballLevel !== b.ballLevel) return;
    if (a.mergeScheduled || b.mergeScheduled) return;
    const lvl = a.ballLevel;
    if (lvl >= MAX_LEVEL) return;

    a.mergeScheduled = true;
    b.mergeScheduled = true;

    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;
    const newLevel = lvl + 1;

    World.remove(world, a);
    World.remove(world, b);

    const merged = createBall(mx, my, newLevel);
    Body.setVelocity(merged, {
      x: (a.velocity.x + b.velocity.x) * 0.5,
      y: (a.velocity.y + b.velocity.y) * 0.5
    });
    updateScore((newLevel + 1) * 10);
  }

  function checkMerge(event) {
    const pairs = event.pairs;
    for (let i = 0; i < pairs.length; i++) {
      const { bodyA, bodyB } = pairs[i];
      mergePair(bodyA, bodyB);
    }
  }

  function resize() {
    const wrap = canvas.parentElement;
    width = wrap.clientWidth;
    height = wrap.clientHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    if (!engine) return;

    for (const w of wallBodies) {
      World.remove(world, w);
    }
    wallBodies = [];

    const groundY = height + WALL_THICK / 2 - 2;
    const ground = Bodies.rectangle(width / 2, groundY, width + WALL_THICK * 2, WALL_THICK, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST,
      label: 'wall'
    });
    const left = Bodies.rectangle(-WALL_THICK / 2, height / 2, WALL_THICK, height + WALL_THICK * 2, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST,
      label: 'wall'
    });
    const right = Bodies.rectangle(width + WALL_THICK / 2, height / 2, WALL_THICK, height + WALL_THICK * 2, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST,
      label: 'wall'
    });
    wallBodies = [ground, left, right];
    World.add(world, wallBodies);
  }

  function drawNeonBall(ctx, body) {
    if (!body.isBall) return;
    const lvl = body.ballLevel;
    const r = ballRadius(lvl);
    const x = body.position.x;
    const y = body.position.y;
    const color = NEON[lvl];

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(body.angle);

    const g = ctx.createRadialGradient(-r * 0.35, -r * 0.35, 0, 0, 0, r);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.25, color);
    g.addColorStop(1, color);

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = 14;
    ctx.stroke();

    ctx.restore();
  }

  function renderLoop() {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, width, height);

    ctx.fillStyle = '#0c0c18';
    ctx.fillRect(0, 0, width, height);

    const bodies = Composite.allBodies(world);
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      if (b.label === 'wall') continue;
      drawNeonBall(ctx, b);
    }

    requestAnimationFrame(renderLoop);
  }

  function pickNextLevel() {
    nextDropLevel = Math.floor(Math.random() * 3);
    nextLabel.textContent = '●';
    nextLabel.style.color = NEON[nextDropLevel];
    nextLabel.style.textShadow = '0 0 14px ' + NEON[nextDropLevel];
  }

  function tryDrop(clientX, clientY) {
    if (dropCooldown) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    if (x < 0 || x > width || y < 0 || y > height) return;

    const r = ballRadius(nextDropLevel);
    const margin = r + 8;
    const px = Math.max(margin, Math.min(width - margin, x));
    const py = 48 + r;

    dropCooldown = true;
    createBall(px, py, nextDropLevel);
    pickNextLevel();
    setTimeout(function () { dropCooldown = false; }, 320);
  }

  function onPointerDown(e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    tryDrop(e.clientX, e.clientY);
    canvas.setPointerCapture(e.pointerId);
  }

  function init() {
    engine = Engine.create({ enableSleeping: true });
    world = engine.world;
    engine.positionIterations = 12;
    engine.velocityIterations = 10;
    engine.constraintIterations = 4;
    engine.gravity.y = 1.05;

    runner = Runner.create();
    Runner.run(runner, engine);

    Events.on(engine, 'collisionStart', checkMerge);

    resize();
    window.addEventListener('resize', resize);

    canvas.addEventListener('pointerdown', onPointerDown);

    pickNextLevel();
    renderLoop();
  }

  init();
})();
  </script>
</body>
</html>
