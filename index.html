<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ball Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      background: #0a0a12;
      font-family: system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #game {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    #hud {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      padding-top: max(10px, env(safe-area-inset-top));
      color: #e8e8f0;
      font-size: 15px;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, rgba(15,15,28,0.95), rgba(10,10,18,0.6));
      z-index: 1;
    }
    #hud span { opacity: 0.85; }
    #nextPreview {
      width: 34px;
      height: 34px;
      object-fit: cover;
      border-radius: 50%;
      vertical-align: middle;
      box-shadow: 0 0 12px rgba(120, 220, 255, 0.35);
      border: 2px solid rgba(180, 220, 255, 0.5);
      background: #1a1a28;
    }
    #score { font-variant-numeric: tabular-nums; font-weight: 600; color: #7dff9a; text-shadow: 0 0 12px rgba(125,255,154,0.45); }
    #wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      padding-left: max(10px, env(safe-area-inset-left));
      padding-right: max(10px, env(safe-area-inset-right));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #stage {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #scaleWrap {
      flex: 0 0 auto;
      flex-shrink: 0;
      line-height: 0;
      /* Do not use overflow:hidden — it clips the right/bottom border after transform scale. */
      overflow: visible;
    }
    #playShell {
      box-sizing: content-box;
      transform-origin: top left;
      border: 3px solid rgba(120, 210, 255, 0.92);
      border-radius: 14px;
      background: #0c0c18;
      box-shadow:
        0 0 24px rgba(0, 200, 255, 0.12),
        inset 0 0 48px rgba(0, 0, 0, 0.35);
    }
    canvas {
      display: block;
      touch-action: none;
      vertical-align: top;
    }
    #hint {
      flex: 0 0 auto;
      margin-top: 10px;
      font-size: 13px;
      color: rgba(200,200,230,0.55);
      pointer-events: none;
      text-align: center;
      max-width: min(100%, 420px);
      padding: 0 8px;
    }
    #gameOverOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(6, 8, 18, 0.82);
      z-index: 20;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      text-align: center;
    }
    #gameOverOverlay.is-visible { display: flex; }
    #gameOverOverlay h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff6b8a;
      text-shadow: 0 0 20px rgba(255, 80, 120, 0.5);
    }
    #gameOverOverlay p { margin: 0; color: #c8c8e0; }
    #restartBtn {
      margin-top: 8px;
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #3d8cff, #2563d4);
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }
    #restartBtn:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="game">
    <div id="hud">
      <span>Next</span>
      <img id="nextPreview" src="" width="34" height="34" alt="" />
      <span>Score <span id="score">0</span></span>
    </div>
    <div id="wrap">
      <div id="stage">
        <div id="scaleWrap">
          <div id="playShell">
            <canvas id="canvas" width="400" height="720" aria-label="Game"></canvas>
          </div>
        </div>
        <p id="hint">Tap to drop · same animal merges · stay below the line</p>
      </div>
    </div>
  </div>

  <div id="gameOverOverlay" aria-live="polite">
    <h2>Game over</h2>
    <p>Animal crossed the danger line.</p>
    <p>Final score: <strong id="finalScore">0</strong></p>
    <button type="button" id="restartBtn">Play again</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/build/decomp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="js/image-trace.js"></script>
  <script>
(function () {
  if (window.Matter && window.decomp && window.Matter.Common.setDecomp) {
    window.Matter.Common.setDecomp(window.decomp);
  }

  const Matter = window.Matter;
  const { Engine, Runner, World, Bodies, Body, Events, Composite } = Matter;

  /** One image per tier: assets/animal1.png … animalN.png (level 0 → animal1). */
  const NUM_ANIMALS = 8;
  const ANIMAL_URLS = [];
  for (var ai = 0; ai < NUM_ANIMALS; ai++) {
    ANIMAL_URLS.push('assets/animal' + (ai + 1) + '.png');
  }
  const FALLBACK_TINT = [
    '#b8c4d4', '#ffb347', '#daa06d', '#f0f0f0',
    '#ffb6c8', '#e8e8e8', '#a67c52', '#f4c430'
  ];

  const REST_BALL = 0.36;
  const REST_WALL = 0.26;
  /** Higher friction so glancing hits convert to spin (roll) instead of pure slide. */
  const FRICTION = 0.34;
  const FRICTION_BALL = 0.44;
  const FRICTION_BALL_STATIC = 0.52;
  const AIR_DRAG = 0.03;
  const WALL_THICK = 100;
  /** Center-distance margin: merge when dist² < (ra+rb−MERGE_OVERLAP)². Lower = at first touch, not after deep overlap. */
  const MERGE_OVERLAP = 0;
  const MAX_LEVEL = ANIMAL_URLS.length - 1;
  const SQUISH_MS = 100;
  /** Temporary multipliers on `render.sprite` while colliding (visual only). */
  const SQUISH_SPRITE_X = 1.09;
  const SQUISH_SPRITE_Y = 0.91;
  /** 0 = merged ball is full opacity/scale same frame (no spawn ease-in). */
  const MERGE_SPAWN_DURATION_MS = 0;
  const MERGE_SPAWN_SCALE_FROM = 1;
  /** Merged balls ignore merge until this elapses so chain steps stay visible (ms). */
  const MERGE_CHAIN_DELAY_MS = 260;
  /** Two balls shrink and move to midpoint (ms). */
  const MERGE_PAIR_TWEEN_MS = 150;
  /** New ball scale ease-out after pair tween (ms). */
  const MERGE_POP_MS = 150;
  const MERGE_POP_FROM = 0.5;
  const PARTICLE_LIFE_MS = 300;
  const PARTICLE_COUNT_MIN = 6;
  const PARTICLE_COUNT_MAX = 8;

  /** @type {Array<object>} */
  var mergePairTweens = [];
  /** @type {Array<object>} */
  var particles = [];

  /** Fixed playfield size (physics + canvas coordinate space). */
  const PLAY_WIDTH = 400;
  const PLAY_HEIGHT = 720;
  const BORDER_PX = 3;

  /** Horizontal danger line (canvas Y). Lose if any “in-play” ball’s top edge goes above this. */
  const DANGER_LINE_Y = 132;
  /** Balls must fall fully below the line before we track them (avoids losing while spawning). */
  const IN_PLAY_CLEAR_BELOW = 28;

  const canvas = document.getElementById('canvas');
  const scaleWrap = document.getElementById('scaleWrap');
  const playShell = document.getElementById('playShell');
  const wrapEl = document.getElementById('wrap');
  const stageEl = document.getElementById('stage');
  const scoreEl = document.getElementById('score');
  const nextPreview = document.getElementById('nextPreview');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const restartBtn = document.getElementById('restartBtn');
  const hintEl = document.getElementById('hint');

  /** False until assets load, engine runs, and input is enabled. */
  var gameReady = false;

  let width = PLAY_WIDTH;
  let height = PLAY_HEIGHT;
  let engine;
  let runner;
  let world;
  let wallBodies = [];
  let score = 0;
  let nextDropLevel = 0;
  let dropCooldown = false;
  let gameOver = false;
  /** @type {HTMLImageElement[]} */
  var animalImages = [];
  /**
   * Per level: traced polygon + sprite size (from ImageTrace), or null to fall back to circle.
   * @type {Array<{ vertices: Array<{x:number,y:number}>, spriteDrawW: number, spriteDrawH: number } | null>}
   */
  var cachedShapeData = [];

  function ballRadius(level) {
    return 18 + level * 7;
  }

  function cloneVertices(verts) {
    return verts.map(function (v) {
      return { x: v.x, y: v.y };
    });
  }

  function createBall(x, y, level, createOpts) {
    createOpts = createOpts || {};
    level = Math.min(Math.max(0, level | 0), MAX_LEVEL);
    const r = ballRadius(level);
    const tint = FALLBACK_TINT[level];
    const commonOpts = {
      restitution: REST_BALL,
      friction: FRICTION_BALL,
      frictionStatic: FRICTION_BALL_STATIC,
      frictionAir: AIR_DRAG,
      density: 0.0022,
      label: 'ball',
      render: { fillStyle: tint }
    };

    var shape = cachedShapeData[level];
    var body;

    if (shape && shape.vertices && shape.vertices.length >= 3) {
      var verts = cloneVertices(shape.vertices);
      body = Bodies.fromVertices(x, y, [verts], commonOpts, true, 0.04, 1, 0.03);
      body.shapeClipVertices = cloneVertices(shape.vertices);
      body.spriteDrawW = shape.spriteDrawW;
      body.spriteDrawH = shape.spriteDrawH;
    } else {
      body = Bodies.circle(x, y, r, commonOpts);
      body.shapeClipVertices = null;
      var d = 2 * r;
      body.spriteDrawW = d;
      body.spriteDrawH = d;
    }

    body.isBall = true;
    body.ballType = level;
    body.ballLevel = level;
    body.mergeScheduled = false;
    body.sleepThreshold = 22;
    if (!body.render) body.render = {};
    body.render.sprite = { xScale: 1, yScale: 1 };
    body.inPlay = false;
    if (createOpts.fromMerge && MERGE_SPAWN_DURATION_MS > 0) {
      body.mergeSpawnAt = performance.now();
      body.mergeSpawnDuration = MERGE_SPAWN_DURATION_MS;
    }
    Composite.add(world, body);
    return body;
  }

  /** Ease-out cubic; t in [0,1]. */
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  /** Returns { alpha, scaleMult } for merge-spawn easing, or full opacity / scale 1 when done. */
  function mergeSpawnVisualState(body, now) {
    if (body.mergeSpawnAt == null) return { alpha: 1, scaleMult: 1 };
    var dur = body.mergeSpawnDuration != null ? body.mergeSpawnDuration : MERGE_SPAWN_DURATION_MS;
    if (dur <= 0) {
      body.mergeSpawnAt = null;
      body.mergeSpawnDuration = null;
      return { alpha: 1, scaleMult: 1 };
    }
    var elapsed = now - body.mergeSpawnAt;
    if (elapsed >= dur) {
      body.mergeSpawnAt = null;
      body.mergeSpawnDuration = null;
      return { alpha: 1, scaleMult: 1 };
    }
    var t = elapsed / dur;
    var e = easeOutCubic(t);
    return {
      alpha: 0.2 + 0.8 * e,
      scaleMult: MERGE_SPAWN_SCALE_FROM + (1 - MERGE_SPAWN_SCALE_FROM) * e
    };
  }

  /** Post-merge pop-in (scale 0.5 → 1). */
  function mergePopVisualState(body, now) {
    if (body.mergePopAt == null) return { scaleMult: 1 };
    var dur = body.mergePopDuration != null ? body.mergePopDuration : MERGE_POP_MS;
    var elapsed = now - body.mergePopAt;
    if (elapsed >= dur) {
      body.mergePopAt = null;
      body.mergePopDuration = null;
      body.mergePopFrom = null;
      return { scaleMult: 1 };
    }
    var t = elapsed / dur;
    var e = easeOutCubic(t);
    var from = body.mergePopFrom != null ? body.mergePopFrom : MERGE_POP_FROM;
    return { scaleMult: from + (1 - from) * e };
  }

  function spawnParticleBurst(px, py, color) {
    var n = PARTICLE_COUNT_MIN + Math.floor(Math.random() * (PARTICLE_COUNT_MAX - PARTICLE_COUNT_MIN + 1));
    var now = performance.now();
    var i;
    for (i = 0; i < n; i++) {
      var ang = Math.random() * Math.PI * 2;
      var sp = 70 + Math.random() * 85;
      particles.push({
        x: px,
        y: py,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        born: now,
        lastT: now,
        maxLife: PARTICLE_LIFE_MS,
        color: color,
        r: 2 + Math.random() * 2.5
      });
    }
  }

  function updateParticles(now) {
    var i;
    for (i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      var dt = (now - p.lastT) / 1000;
      p.lastT = now;
      if (dt > 0.05) dt = 0.05;
      if (dt < 0) dt = 0;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (now - p.born >= p.maxLife) particles.splice(i, 1);
    }
  }

  function drawParticles(ctx, now) {
    var i;
    for (i = 0; i < particles.length; i++) {
      var p = particles[i];
      var age = now - p.born;
      var a = 1 - age / p.maxLife;
      if (a <= 0) continue;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawBallSnapshot(ctx, x, y, angle, level, clip, spriteDrawW, spriteDrawH, scaleMult, alpha) {
    var r = ballRadius(level);
    var img = animalImages[level];
    var tint = FALLBACK_TINT[level];
    var dw = spriteDrawW || 2 * r;
    var dh = spriteDrawH || 2 * r;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(scaleMult, scaleMult);
    ctx.beginPath();
    var k;
    if (clip && clip.length >= 3) {
      ctx.moveTo(clip[0].x, clip[0].y);
      for (k = 1; k < clip.length; k++) ctx.lineTo(clip[k].x, clip[k].y);
      ctx.closePath();
    } else {
      ctx.arc(0, 0, r, 0, Math.PI * 2);
    }
    ctx.clip();
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -dw * 0.5, -dh * 0.5, dw, dh);
    } else {
      var g = ctx.createRadialGradient(-r * 0.35, -r * 0.35, 0, 0, 0, r);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.35, tint);
      g.addColorStop(1, tint);
      ctx.fillStyle = g;
      ctx.fillRect(-dw * 0.5, -dh * 0.5, dw, dh);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawMergePairTweens(ctx, now) {
    var i;
    for (i = 0; i < mergePairTweens.length; i++) {
      var tw = mergePairTweens[i];
      var elapsed = now - tw.startTime;
      var u = Math.min(1, Math.max(0, elapsed / tw.duration));
      var ax = tw.ax0 + (tw.midX - tw.ax0) * u;
      var ay = tw.ay0 + (tw.midY - tw.ay0) * u;
      var bx = tw.bx0 + (tw.midX - tw.bx0) * u;
      var by = tw.by0 + (tw.midY - tw.by0) * u;
      var sc = 1 - u;
      drawBallSnapshot(ctx, ax, ay, tw.angleA, tw.level, tw.clipA, tw.spriteDrawWA, tw.spriteDrawHA, sc, 1);
      drawBallSnapshot(ctx, bx, by, tw.angleB, tw.level, tw.clipB, tw.spriteDrawWB, tw.spriteDrawHB, sc, 1);
    }
  }

  function completeMergeTween(tw) {
    var now = performance.now();
    var bright = FALLBACK_TINT[tw.newLevel] || '#a8f0ff';
    spawnParticleBurst(tw.midX, tw.midY, bright);
    var merged = createBall(tw.midX, tw.midY, tw.newLevel, { fromMerge: true });
    merged.mergePopAt = now;
    merged.mergePopDuration = MERGE_POP_MS;
    merged.mergePopFrom = MERGE_POP_FROM;
    merged.mergeImmunityUntil = now + MERGE_CHAIN_DELAY_MS;
    Body.setVelocity(merged, { x: tw.vxAvg, y: tw.vyAvg });
    updateScore((tw.newLevel + 1) * 10);
  }

  function updateMergePairTweens(now) {
    var i;
    for (i = mergePairTweens.length - 1; i >= 0; i--) {
      var tw = mergePairTweens[i];
      if (now - tw.startTime >= tw.duration) {
        completeMergeTween(tw);
        mergePairTweens.splice(i, 1);
      }
    }
  }

  function markBallsInPlay() {
    var bodies = Composite.allBodies(world);
    for (var i = 0; i < bodies.length; i++) {
      var b = bodies[i];
      if (!b.isBall || b.inPlay) continue;
      if (b.bounds && b.bounds.min.y > DANGER_LINE_Y + IN_PLAY_CLEAR_BELOW) {
        b.inPlay = true;
      }
    }
  }

  function checkDangerLine() {
    if (gameOver) return;
    markBallsInPlay();
    var bodies = Composite.allBodies(world);
    for (var i = 0; i < bodies.length; i++) {
      var b = bodies[i];
      if (!b.isBall || !b.inPlay || !b.bounds) continue;
      if (b.bounds.min.y < DANGER_LINE_Y) {
        triggerGameOver();
        return;
      }
    }
  }

  function triggerGameOver() {
    if (gameOver) return;
    gameOver = true;
    Runner.stop(runner);
    canvas.removeEventListener('pointerdown', onPointerDown);
    if (finalScoreEl) finalScoreEl.textContent = String(score);
    if (gameOverOverlay) gameOverOverlay.classList.add('is-visible');
  }

  function restartGame() {
    location.reload();
  }

  function squishBall(body) {
    if (!body || !body.isBall || !bodyStillInWorld(body)) return;
    if (!body.render) body.render = {};
    if (!body.render.sprite) body.render.sprite = { xScale: 1, yScale: 1 };
    clearTimeout(body._squishEndTimer);
    body.render.sprite.xScale = SQUISH_SPRITE_X;
    body.render.sprite.yScale = SQUISH_SPRITE_Y;
    body._squishEndTimer = setTimeout(function () {
      if (!bodyStillInWorld(body) || !body.render || !body.render.sprite) return;
      body.render.sprite.xScale = 1;
      body.render.sprite.yScale = 1;
    }, SQUISH_MS);
  }

  function onCollisionSquish(event) {
    var pairs = event.pairs;
    for (var i = 0; i < pairs.length; i++) {
      var bodyA = pairs[i].bodyA;
      var bodyB = pairs[i].bodyB;
      if (bodyA.isBall) squishBall(bodyA);
      if (bodyB.isBall) squishBall(bodyB);
    }
  }

  /** Same type = same tier (colour + size). */
  function sameBallType(a, b) {
    return !!(a.isBall && b.isBall && a.ballType === b.ballType);
  }

  function mergeImmune(body, t) {
    return body.mergeImmunityUntil != null && t < body.mergeImmunityUntil;
  }

  function bodyStillInWorld(body) {
    var list = Composite.allBodies(world);
    for (var i = 0; i < list.length; i++) {
      if (list[i] === body) return true;
    }
    return false;
  }

  function ballsOverlap(a, b) {
    var ra = ballRadius(a.ballType);
    var rb = ballRadius(b.ballType);
    var dx = b.position.x - a.position.x;
    var dy = b.position.y - a.position.y;
    var sep = ra + rb - MERGE_OVERLAP;
    return dx * dx + dy * dy < sep * sep;
  }

  function updateScore(points) {
    score += points;
    scoreEl.textContent = String(score);
  }

  /**
   * mergeScheduled: only blocks duplicate mergePair calls on the same two bodies before Composite.remove runs.
   * It does not skip the first collision — unrelated merges are unaffected.
   * @returns {boolean} true if a merge actually happened
   */
  function mergePair(a, b) {
    var t = performance.now();
    if (!bodyStillInWorld(a) || !bodyStillInWorld(b)) return false;
    if (!sameBallType(a, b)) return false;
    if (mergeImmune(a, t) || mergeImmune(b, t)) return false;
    if (a.mergeScheduled || b.mergeScheduled) return false;
    const lvl = a.ballType;
    if (lvl >= MAX_LEVEL) return false;

    a.mergeScheduled = true;
    b.mergeScheduled = true;

    const mx = (a.position.x + b.position.x) / 2;
    const my = (a.position.y + b.position.y) / 2;
    const newLevel = lvl + 1;
    const vxAvg = (a.velocity.x + b.velocity.x) * 0.5;
    const vyAvg = (a.velocity.y + b.velocity.y) * 0.5;

    var clipA = a.shapeClipVertices ? cloneVertices(a.shapeClipVertices) : null;
    var clipB = b.shapeClipVertices ? cloneVertices(b.shapeClipVertices) : null;

    mergePairTweens.push({
      ax0: a.position.x,
      ay0: a.position.y,
      bx0: b.position.x,
      by0: b.position.y,
      angleA: a.angle,
      angleB: b.angle,
      midX: mx,
      midY: my,
      level: lvl,
      newLevel: newLevel,
      clipA: clipA,
      clipB: clipB,
      spriteDrawWA: a.spriteDrawW,
      spriteDrawHA: a.spriteDrawH,
      spriteDrawWB: b.spriteDrawW,
      spriteDrawHB: b.spriteDrawH,
      startTime: t,
      duration: MERGE_PAIR_TWEEN_MS,
      vxAvg: vxAvg,
      vyAvg: vyAvg
    });

    Composite.remove(world, a);
    Composite.remove(world, b);
    return true;
  }

  /**
   * Same-frame overlap backup (no queue). Runs after pair merges so missed contacts still resolve this tick.
   */
  function mergeFromCollisionEvent(event) {
    const pairs = event.pairs;
    for (let i = 0; i < pairs.length; i++) {
      const bodyA = pairs[i].bodyA;
      const bodyB = pairs[i].bodyB;
      if (!bodyA.isBall || !bodyB.isBall) continue;
      mergePair(bodyA, bodyB);
    }
    mergeOverlappingBalls();
  }

  /** Physics events sometimes miss contacts; overlap test picks up real collisions. */
  function mergeOverlappingBalls() {
    var safety = 0;
    var merged = true;
    while (merged && safety < 24) {
      safety++;
      merged = false;
      var balls = Composite.allBodies(world).filter(function (b) {
        return b.isBall;
      });
      outer: for (var i = 0; i < balls.length; i++) {
        var a = balls[i];
        if (!bodyStillInWorld(a)) continue;
        for (var j = i + 1; j < balls.length; j++) {
          var b = balls[j];
          if (!bodyStillInWorld(b)) continue;
          if (!sameBallType(a, b)) continue;
          if (!ballsOverlap(a, b)) continue;
          if (mergePair(a, b)) {
            merged = true;
            break outer;
          }
        }
      }
    }
  }

  function fitPlayArea() {
    var outerW = PLAY_WIDTH + 2 * BORDER_PX;
    var outerH = PLAY_HEIGHT + 2 * BORDER_PX;
    var pad = 16;
    var hintReserve = 52;
    var availW = stageEl.clientWidth - pad;
    var availH = stageEl.clientHeight - pad - hintReserve;
    if (availW < 60) availW = stageEl.clientWidth;
    if (availH < 60) availH = stageEl.clientHeight - hintReserve;
    var s = Math.min(availW / outerW, availH / outerH, 1);
    playShell.style.boxSizing = 'content-box';
    playShell.style.width = PLAY_WIDTH + 'px';
    playShell.style.height = PLAY_HEIGHT + 'px';
    playShell.style.transform = 'scale(' + s + ')';
    scaleWrap.style.width = Math.ceil(outerW * s) + 'px';
    scaleWrap.style.height = Math.ceil(outerH * s) + 'px';
  }

  function resize() {
    width = PLAY_WIDTH;
    height = PLAY_HEIGHT;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    fitPlayArea();

    if (!engine || wallBodies.length > 0) return;

    const groundY = height + WALL_THICK / 2 - 2;
    const ground = Bodies.rectangle(width / 2, groundY, width + WALL_THICK * 2, WALL_THICK, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST_WALL,
      label: 'wall'
    });
    const left = Bodies.rectangle(-WALL_THICK / 2, height / 2, WALL_THICK, height + WALL_THICK * 2, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST_WALL,
      label: 'wall'
    });
    const right = Bodies.rectangle(width + WALL_THICK / 2, height / 2, WALL_THICK, height + WALL_THICK * 2, {
      isStatic: true,
      friction: FRICTION,
      restitution: REST_WALL,
      label: 'wall'
    });
    wallBodies = [ground, left, right];
    Composite.add(world, wallBodies);
  }

  function drawAnimalBall(ctx, body, now) {
    if (!body.isBall) return;
    const lvl = body.ballLevel;
    const r = ballRadius(lvl);
    const x = body.position.x;
    const y = body.position.y;
    const img = animalImages[lvl];
    const tint = FALLBACK_TINT[lvl];

    var spr = body.render && body.render.sprite ? body.render.sprite : { xScale: 1, yScale: 1 };
    var dw = body.spriteDrawW || 2 * r;
    var dh = body.spriteDrawH || 2 * r;
    var clip = body.shapeClipVertices;
    var spawn = mergeSpawnVisualState(body, now);
    var pop = mergePopVisualState(body, now);
    var drawScale = spawn.scaleMult * pop.scaleMult;

    ctx.save();
    ctx.globalAlpha = spawn.alpha;
    ctx.translate(x, y);
    ctx.rotate(body.angle);
    ctx.scale(drawScale, drawScale);
    ctx.scale(spr.xScale, spr.yScale);
    ctx.beginPath();
    var k;
    if (clip && clip.length >= 3) {
      ctx.moveTo(clip[0].x, clip[0].y);
      for (k = 1; k < clip.length; k++) {
        ctx.lineTo(clip[k].x, clip[k].y);
      }
      ctx.closePath();
    } else {
      ctx.arc(0, 0, r, 0, Math.PI * 2);
    }
    ctx.clip();

    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -dw * 0.5, -dh * 0.5, dw, dh);
    } else {
      const g = ctx.createRadialGradient(-r * 0.35, -r * 0.35, 0, 0, 0, r);
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.35, tint);
      g.addColorStop(1, tint);
      ctx.fillStyle = g;
      ctx.fillRect(-dw * 0.5, -dh * 0.5, dw, dh);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  /** Draw after engine.afterUpdate so merges run before paint (avoids extra rAF racing the Runner). */
  function drawFrame() {
    const ctx = canvas.getContext('2d');
    const now = performance.now();
    updateMergePairTweens(now);
    updateParticles(now);

    ctx.clearRect(0, 0, width, height);

    ctx.fillStyle = '#0c0c18';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.setLineDash([10, 8]);
    ctx.strokeStyle = 'rgba(255, 90, 110, 0.95)';
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(255, 60, 90, 0.45)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(8, DANGER_LINE_Y);
    ctx.lineTo(width - 8, DANGER_LINE_Y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 120, 140, 0.85)';
    ctx.font = '11px system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText('Danger — keep animals below', width - 10, DANGER_LINE_Y - 6);
    ctx.restore();

    drawMergePairTweens(ctx, now);

    const bodies = Composite.allBodies(world);
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      if (b.label === 'wall') continue;
      drawAnimalBall(ctx, b, now);
    }

    drawParticles(ctx, now);
  }

  function onEngineAfterUpdate() {
    mergeOverlappingBalls();
    checkDangerLine();
    drawFrame();
  }

  function pickNextLevel() {
    nextDropLevel = Math.floor(Math.random() * 3);
    nextPreview.src = ANIMAL_URLS[nextDropLevel];
    nextPreview.alt = 'Next: tier ' + (nextDropLevel + 1);
  }

  function tryDrop(clientX, clientY) {
    if (!gameReady || gameOver || dropCooldown) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((clientX - rect.left) / rect.width) * width;
    const y = ((clientY - rect.top) / rect.height) * height;
    if (x < 0 || x > width || y < 0 || y > height) return;

    const r = ballRadius(nextDropLevel);
    const margin = r + 8;
    const px = Math.max(margin, Math.min(width - margin, x));
    const py = 48 + r;

    dropCooldown = true;
    createBall(px, py, nextDropLevel);
    pickNextLevel();
    setTimeout(function () { dropCooldown = false; }, 320);
  }

  function onPointerDown(e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    tryDrop(e.clientX, e.clientY);
    canvas.setPointerCapture(e.pointerId);
  }

  /**
   * Loads every URL in ANIMAL_URLS into animalImages[i] in order.
   * Uses Promise.all so all loads (or errors) must settle before the game starts.
   */
  function loadAllAnimalImages() {
    animalImages = new Array(ANIMAL_URLS.length);
    var promises = ANIMAL_URLS.map(function (url, idx) {
      return new Promise(function (resolve) {
        var im = new Image();
        var settled = false;
        function finish() {
          if (settled) return;
          settled = true;
          im.onload = null;
          im.onerror = null;
          animalImages[idx] = im;
          resolve(im);
        }
        im.onload = finish;
        im.onerror = finish;
        im.src = url;
        if (im.complete && im.naturalWidth > 0) finish();
      });
    });
    return Promise.all(promises);
  }

  function drawLoadingScreen() {
    var ctx = canvas.getContext('2d');
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#0c0c18';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = 'rgba(180, 210, 255, 0.92)';
    ctx.font = '20px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Loading...', width * 0.5, height * 0.5);
  }

  function buildShapeCache() {
    cachedShapeData = new Array(NUM_ANIMALS);
    var IT = window.ImageTrace;
    if (!IT || typeof IT.traceImageToVertices !== 'function') {
      for (var z = 0; z < NUM_ANIMALS; z++) cachedShapeData[z] = null;
      return;
    }
    var lv;
    for (lv = 0; lv < NUM_ANIMALS; lv++) {
      var img = animalImages[lv];
      var targetR = ballRadius(lv);
      cachedShapeData[lv] = null;
      if (!img || !img.complete || img.naturalWidth < 2) continue;
      try {
        var traced = IT.traceImageToVertices(img, targetR, {
          maxTraceDim: 128,
          rdpEpsilon: 1.2
        });
        if (traced && traced.vertices && traced.vertices.length >= 3) {
          cachedShapeData[lv] = traced;
        }
      } catch (err) {
        cachedShapeData[lv] = null;
      }
    }
  }

  function startGame() {
    engine = Engine.create({ enableSleeping: true });
    world = engine.world;
    engine.positionIterations = 12;
    engine.velocityIterations = 10;
    engine.constraintIterations = 4;
    engine.gravity.y = 1.05;

    runner = Runner.create();
    Runner.run(runner, engine);

    Events.on(engine, 'collisionStart', mergeFromCollisionEvent);
    Events.on(engine, 'collisionStart', onCollisionSquish);
    Events.on(engine, 'collisionActive', mergeFromCollisionEvent);
    Events.on(engine, 'afterUpdate', onEngineAfterUpdate);

    resize();

    canvas.addEventListener('pointerdown', onPointerDown);
    if (restartBtn) restartBtn.addEventListener('click', restartGame);

    gameReady = true;
    pickNextLevel();
    drawFrame();
  }

  function init() {
    resize();
    window.addEventListener('resize', function () {
      resize();
      if (!gameReady) drawLoadingScreen();
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fitPlayArea);
    }

    if (hintEl) hintEl.textContent = 'Loading...';
    drawLoadingScreen();

    loadAllAnimalImages().then(function () {
      if (hintEl) {
        hintEl.textContent = 'Tap to drop · same animal merges · stay below the line';
      }
      buildShapeCache();
      startGame();
    });
  }

  init();
})();
  </script>
</body>
</html>
